{% extends "base.html" %}

{% block title %}Mot de passe oublié - E-Trans{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/change-password.css') }}">
{% endblock %}

{% block content %}
<div class="change-password-page">
    <div class="change-password-container">
        <div class="change-password-card">
            <div class="card-header">
                <div class="card-icon">
                    <i class="fas fa-redo"></i>
                </div>
                <h1 class="card-title">Réinitialiser le mot de passe</h1>
                <p class="card-subtitle">
                    Entrez votre adresse email pour recevoir un lien de réinitialisation.
                </p>
            </div>

            <form method="POST" id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email" class="form-label required">Email</label>
                    <div>
                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               placeholder="votre@exemple.com"
                               required>
                    </div>
                </div>

                <button type="submit" class="btn-change-password" id="submitBtn">
                    Envoyer le lien de réinitialisation
                </button>
            </form>

            <div class="back-link">
                <a href="{{ url_for('auth.login') }}">
                    <i class="fas fa-arrow-left"></i>
                    Retour à la connexion
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    // Form submit UX
    document.getElementById('forgotPasswordForm')?.addEventListener('submit', function(e) {
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi en cours...';
    });
</script>
{% endblock %}
